name: Build APK

on:
  workflow_dispatch:
  push:

jobs:
  build:
    runs-on: ubuntu-latest
    # This ensures your build commands run inside the correct folder
    defaults:
      run:
        working-directory: MobileHubPOS

    steps:
      - name: Checkout project
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build APK
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: MobileHub-POS-APK
          # We include 'MobileHubPOS/' here because the artifact uploader 
          # looks from the root of the repository.
          path: MobileHubPOS/app/build/outputs/apk/debug/*.apk
